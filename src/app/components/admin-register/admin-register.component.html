<app-navbar></app-navbar>

<div
  class="custom-alert"
  *ngIf="showAlertBox"
  [ngStyle]="{
    backgroundColor: alertType === 'success' ? '#D4EDDA' : '#F8D7DA',
    color: alertType === 'success' ? '#155724' : '#721C24'
  }"
>
  {{ alertMessage }}
</div>


<div class="form-container">
  <h2>Recruiter Sign Up</h2>
  <p>Welcome back! Please sign in to continue</p>

  <form (ngSubmit)="onLogin()">
    <div class="form-group">
      <label>Email address</label>
      <input
        type="email"
        [(ngModel)]="recruiter.email"
        name="email"
        placeholder="Enter your email"
        #firstNameInput
        required
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="recruiter.password"
          name="password"
          placeholder="Enter your password"
          required
        />
        <span class="toggle-icon" (click)="togglePasswordVisibility()">
          <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
        </span>
      </div>
    </div>

    <button type="submit">Register</button>
    <p class="reg-btn">
      Already have an account? <a routerLink="/admin-login">Sign in</a>
    </p>
  </form>
</div>
