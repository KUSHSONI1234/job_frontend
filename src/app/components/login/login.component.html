<div
  *ngIf="alertMessage"
  [ngClass]="{
    'alert-box': true,
    'alert-success': alertType === 'success',
    'alert-error': alertType === 'error'
  }"
>
  {{ alertMessage }}
</div>

<div class="form-container">
  <form (ngSubmit)="login()" #loginForm="ngForm" class="register-form">
    <h2>Login</h2>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        #emailInput
        [(ngModel)]="email"
        placeholder="Enter your email address"
        required
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter your password"
        [(ngModel)]="password"
        required
      />
    </div>

    <button type="submit">Login</button>
    <p class="log-btn">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </form>
</div>



<div *ngIf="fullName" class="welcome-msg">
  Welcome, {{ fullName }}!
</div>
