<app-navbar></app-navbar>

<div class="admin-login-container">
  <div class="admin-login-card">
    <h2>Admin Login</h2>
    <form>
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="loginData.email"
          name="email"
          #emailInput
          class="form-control"
          required
        />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="loginData.password"
          name="password"
          class="form-control"
          required
        />
      </div>
      <button type="submit" class="submit-btn">Login</button>
      <p class="log-btn">
        Don’t have an account? <a routerLink="/admin-register">Register</a>
      </p>
    </form>
  </div>
</div>
