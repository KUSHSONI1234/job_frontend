<app-navbar></app-navbar>
<div
  *ngIf="showAlert"
  [ngClass]="{
    'alert-box': true,
    'alert-success': alertType === 'success',
    'alert-error': alertType === 'error'
  }"
>
  {{ alertMessage }}
</div>

<!-- Your existing form below -->

<div class="admin-register-container">
  <div class="admin-register-card">
    <h2>Admin Registration</h2>

    <form (ngSubmit)="registerAdmin()" #adminForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          class="form-control"
          #emailInput
          [(ngModel)]="admin.email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          class="form-control"
          [(ngModel)]="admin.password"
          required
        />
      </div>

      <button type="submit" class="submit-btn">Register</button>
      <p class="log-btn">
        Already have an account? <a routerLink="/admin-login">Login</a>
      </p>
    </form>
  </div>
</div>
