<div class="form-container">
  <form
    (ngSubmit)="adminLogin()"
    #adminLoginForm="ngForm"
    class="register-form"
  >
    <h2>Admin Login</h2>

    <div class="form-group">
      <label for="adminEmail">Email</label>
      <input
        type="email"
        id="adminEmail"
        name="adminEmail"
        [(ngModel)]="adminEmail"
        #adminEmailInput
        required
      />
    </div>

    <div class="form-group">
      <label for="adminPassword">Password</label>
      <input
        type="password"
        id="adminPassword"
        name="adminPassword"
        [(ngModel)]="adminPassword"
        required
      />
    </div>

    <button type="submit">Admin Login</button>
  </form>
</div>
